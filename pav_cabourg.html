<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>PAV Cabourg — NCPA</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css"/>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --red: #B91E27;
      --red-dark: #8f1720;
      --green-ncpa: #B1B993;
      --omr: #374151;
      --emb: #B45309;
      --verre: #166534;
      --textile: #6D28D9;
      --carton: #7C2D12;
      --autre: #475569;
      --sidebar-w: 360px;
      --header-h: 50px;
    }

    html, body {
      height: 100%;
      overflow: hidden;
      font-family: Calibri, 'Segoe UI', system-ui, sans-serif;
    }

    /* ── HEADER ─────────────────────────────────────── */
    #header {
      position: fixed; top: 0; left: 0; right: 0;
      height: var(--header-h);
      background: var(--red);
      color: #fff;
      display: flex; align-items: center; justify-content: space-between;
      padding: 0 14px;
      z-index: 900;
      box-shadow: 0 2px 8px rgba(0,0,0,0.25);
    }
    .header-brand { display: flex; align-items: center; gap: 10px; }
    .header-logo {
      width: 34px; height: 34px; border-radius: 50%;
      background: rgba(255,255,255,0.2);
      display: flex; align-items: center; justify-content: center;
      font-weight: 900; font-size: 13px; letter-spacing: -0.5px; flex-shrink: 0;
    }
    .header-text h1 { font-size: 14px; font-weight: 700; letter-spacing: 0.3px; }
    .header-text p  { font-size: 11px; opacity: .75; }
    .header-actions { display: flex; gap: 8px; align-items: center; }

    .btn-header {
      background: rgba(255,255,255,0.15);
      color: #fff; border: 1px solid rgba(255,255,255,0.3);
      padding: 5px 11px; border-radius: 5px;
      font-size: 12px; font-weight: 600; cursor: pointer;
      display: flex; align-items: center; gap: 5px;
      transition: background .15s;
      white-space: nowrap;
    }
    .btn-header:hover  { background: rgba(255,255,255,0.28); }
    .btn-header.active { background: #fbbf24; color: #78350f; border-color: #f59e0b; }

    /* ── MAP ─────────────────────────────────────────── */
    #map {
      position: fixed;
      top: var(--header-h); left: 0; right: 0; bottom: 0;
      z-index: 1;
      transition: right .3s ease;
    }
    #map.sidebar-open  { right: var(--sidebar-w); }
    #map.adding-cursor { cursor: crosshair !important; }
    #map.adding-cursor .leaflet-interactive { cursor: crosshair !important; }

    /* ── ADD BANNER ──────────────────────────────────── */
    #add-banner {
      position: fixed;
      top: calc(var(--header-h) + 12px);
      left: 50%; transform: translateX(-50%);
      background: #fffbeb; border: 2px solid #f59e0b; border-radius: 8px;
      padding: 7px 16px;
      font-size: 13px; font-weight: 600; color: #92400e;
      z-index: 500; display: none; white-space: nowrap;
      box-shadow: 0 2px 8px rgba(0,0,0,0.15);
    }

    /* ── KPI BAR ─────────────────────────────────────── */
    #kpi-bar {
      position: fixed;
      top: calc(var(--header-h) + 10px); left: 10px;
      background: #fff; border-radius: 8px;
      padding: 8px 14px;
      display: flex; gap: 16px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.2);
      z-index: 400; font-size: 12px;
    }
    .kpi { text-align: center; }
    .kpi-val { font-size: 20px; font-weight: 800; color: var(--red); line-height: 1.1; }
    .kpi-lbl { font-size: 10px; color: #6b7280; text-transform: uppercase; letter-spacing: 0.4px; }

    /* ── LEGEND ──────────────────────────────────────── */
    #legend {
      position: fixed;
      bottom: 30px; left: 10px;
      background: #fff; border-radius: 8px;
      padding: 10px 13px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.2);
      z-index: 400; font-size: 12px;
    }
    #legend h3 {
      font-size: 10px; text-transform: uppercase;
      letter-spacing: 0.6px; color: #9ca3af; margin-bottom: 7px;
    }
    .leg-item  { display: flex; align-items: center; gap: 7px; margin-bottom: 3px; }
    .leg-dot   { width: 11px; height: 11px; border-radius: 50%; flex-shrink: 0; }
    .leg-sep   { border-top: 1px solid #f0f0f0; margin: 5px 0; }
    .leg-custom { font-style: italic; color: #d97706; }

    /* ── SIDEBAR ─────────────────────────────────────── */
    #sidebar {
      position: fixed;
      top: var(--header-h); right: 0;
      width: var(--sidebar-w);
      bottom: 0;
      background: #f9fafb;
      border-left: 1px solid #e5e7eb;
      display: flex; flex-direction: column;
      transform: translateX(100%);
      transition: transform .3s ease;
      z-index: 800;
      box-shadow: -4px 0 20px rgba(0,0,0,0.12);
    }
    #sidebar.open { transform: translateX(0); }

    #sb-header {
      background: var(--red); color: #fff;
      padding: 13px 14px 11px;
      flex-shrink: 0;
    }
    .sb-header-row { display: flex; justify-content: space-between; align-items: flex-start; }
    #sb-title { font-size: 13px; font-weight: 700; line-height: 1.4; max-width: 280px; }
    #sb-sub   { font-size: 11px; opacity: .75; margin-top: 2px; }
    #close-btn {
      background: none; border: none; color: #fff;
      font-size: 18px; cursor: pointer; opacity: .7;
      padding: 0; line-height: 1; transition: opacity .15s; flex-shrink: 0;
    }
    #close-btn:hover { opacity: 1; }

    #sb-body {
      flex: 1; overflow-y: auto;
      padding: 14px;
      display: flex; flex-direction: column; gap: 14px;
    }

    /* ── SIDEBAR COMPONENTS ──────────────────────────── */
    .section-title {
      font-size: 10px; font-weight: 700;
      text-transform: uppercase; letter-spacing: 0.7px;
      color: #9ca3af; margin-bottom: 6px;
    }

    .info-card {
      background: #fff; border-radius: 7px;
      border: 1px solid #e5e7eb;
      overflow: hidden;
    }
    .info-row {
      display: flex; align-items: center;
      padding: 7px 11px;
      border-bottom: 1px solid #f3f4f6;
      font-size: 13px;
    }
    .info-row:last-child { border-bottom: none; }
    .info-key   { color: #6b7280; width: 38%; flex-shrink: 0; font-size: 12px; }
    .info-val   { font-weight: 600; color: #111827; }

    .flux-pill {
      display: inline-block;
      padding: 2px 9px; border-radius: 10px;
      font-size: 11px; font-weight: 700; color: #fff;
    }

    .status-dot {
      display: inline-block; width: 8px; height: 8px;
      border-radius: 50%; margin-right: 5px;
    }

    /* comment */
    .comment-block { background: #fff; border-radius: 7px; border: 1px solid #e5e7eb; padding: 10px; }
    .comment-top { display: flex; justify-content: space-between; align-items: center; margin-bottom: 6px; }
    #save-badge {
      font-size: 10px; color: #16a34a; font-weight: 600;
      opacity: 0; transition: opacity .3s;
    }
    #save-badge.show { opacity: 1; }
    #comment-ta {
      width: 100%; min-height: 90px; max-height: 200px;
      padding: 8px; border: 1px solid #e5e7eb; border-radius: 5px;
      font-size: 13px; font-family: inherit;
      resize: vertical; transition: border-color .15s;
    }
    #comment-ta:focus { outline: none; border-color: var(--red); }

    /* photo */
    .photo-block { background: #fff; border-radius: 7px; border: 1px solid #e5e7eb; padding: 10px; }
    .photo-upload-lbl {
      display: flex; align-items: center; justify-content: center; gap: 7px;
      padding: 10px; border: 2px dashed #d1d5db; border-radius: 6px;
      cursor: pointer; color: #6b7280; font-size: 13px;
      transition: border-color .15s, color .15s;
    }
    .photo-upload-lbl:hover { border-color: var(--red); color: var(--red); }
    .photo-wrap { position: relative; }
    .photo-wrap img { width: 100%; border-radius: 5px; display: block; }
    .photo-del {
      position: absolute; top: 5px; right: 5px;
      background: rgba(0,0,0,.55); color: #fff; border: none;
      border-radius: 50%; width: 22px; height: 22px;
      font-size: 12px; cursor: pointer; display: flex;
      align-items: center; justify-content: center;
    }

    /* form (add mode) */
    .form-block { background: #fff; border-radius: 7px; border: 1px solid #e5e7eb; padding: 11px; display: flex; flex-direction: column; gap: 10px; }
    .fg { display: flex; flex-direction: column; gap: 4px; }
    .fg label { font-size: 12px; font-weight: 600; color: #374151; }
    .fg input, .fg select, .fg textarea {
      padding: 7px 9px; border: 1px solid #d1d5db; border-radius: 5px;
      font-size: 13px; font-family: inherit; transition: border-color .15s;
    }
    .fg input:focus, .fg select:focus, .fg textarea:focus { outline: none; border-color: var(--red); }
    .coords-box {
      background: #f3f4f6; border-radius: 5px;
      padding: 7px 9px; font-size: 12px; font-family: monospace; color: #374151;
    }
    .hint { font-size: 11px; color: #9ca3af; margin-top: 1px; }

    /* buttons */
    .btn-save {
      background: var(--red); color: #fff; border: none;
      padding: 9px; border-radius: 6px; font-size: 14px; font-weight: 700;
      cursor: pointer; width: 100%; transition: background .15s;
    }
    .btn-save:hover { background: var(--red-dark); }
    .btn-del {
      background: none; color: #dc2626; border: 1px solid #dc2626;
      padding: 8px; border-radius: 6px; font-size: 13px;
      cursor: pointer; width: 100%; transition: background .15s;
    }
    .btn-del:hover { background: #fef2f2; }

    /* ── MOBILE ──────────────────────────────────────── */
    @media (max-width: 640px) {
      :root { --sidebar-w: 100vw; }
      #map.sidebar-open { right: 0; }
      #kpi-bar { display: none; }
      #sidebar {
        top: auto; bottom: 0; height: 72vh;
        transform: translateY(100%);
        width: 100%; border-left: none; border-top: 2px solid var(--red);
      }
      #sidebar.open { transform: translateY(0); }
    }
  </style>
</head>
<body>

<!-- ═══════════════════════════════ HEADER ══════════════════════════════ -->
<div id="header">
  <div class="header-brand">
    <div class="header-logo">NC<br>PA</div>
    <div class="header-text">
      <h1>PAV Cabourg — Réunion terrain</h1>
      <p>Normandie Cabourg Pays d'Auge</p>
    </div>
  </div>
  <div class="header-actions">
    <button class="btn-header" id="add-btn" onclick="toggleAddMode()">＋ Ajouter</button>
    <button class="btn-header" onclick="exportData()" title="Exporter les données en JSON">↓ Export</button>
  </div>
</div>

<!-- ═══════════════════════════════ MAP ═════════════════════════════════ -->
<div id="map"></div>
<div id="add-banner">📍 Cliquez sur la carte pour placer l'équipement</div>

<!-- KPI -->
<div id="kpi-bar">
  <div class="kpi"><div class="kpi-val" id="kpi-total">0</div><div class="kpi-lbl">équipements</div></div>
  <div class="kpi"><div class="kpi-val" id="kpi-sites">0</div><div class="kpi-lbl">sites</div></div>
  <div class="kpi"><div class="kpi-val" id="kpi-notes">0</div><div class="kpi-lbl">commentaires</div></div>
</div>

<!-- LEGEND -->
<div id="legend">
  <h3>Flux</h3>
  <div class="leg-item"><div class="leg-dot" style="background:#374151"></div>OMR</div>
  <div class="leg-item"><div class="leg-dot" style="background:#B45309"></div>Emballages & Papiers</div>
  <div class="leg-item"><div class="leg-dot" style="background:#166534"></div>Verre</div>
  <div class="leg-item"><div class="leg-dot" style="background:#6D28D9"></div>Textile</div>
  <div class="leg-item"><div class="leg-dot" style="background:#7C2D12"></div>Carton</div>
  <div class="leg-item"><div class="leg-dot" style="background:#475569"></div>Autre</div>
  <div class="leg-sep"></div>
  <div class="leg-item"><div class="leg-dot" style="background:#f59e0b; border:2px solid #f59e0b;"></div><span class="leg-custom">Ajouté manuellement</span></div>
</div>

<!-- ═══════════════════════════════ SIDEBAR ══════════════════════════════ -->
<div id="sidebar">
  <div id="sb-header">
    <div class="sb-header-row">
      <div>
        <div id="sb-title">—</div>
        <div id="sb-sub">—</div>
      </div>
      <button id="close-btn" onclick="closeSidebar()">✕</button>
    </div>
  </div>
  <div id="sb-body"></div>
</div>

<!-- ═══════════════════════════════ SCRIPT ═══════════════════════════════ -->
<script>
// ═══════════════════════════════════════════════════════════
// 1. DONNÉES INITIALES (depuis Cabourg.xlsx)
// ═══════════════════════════════════════════════════════════
const INITIAL = [
  { id:'e01', lat:49.29048037, lng:-0.11548445, adresse:'Avenue de Bavent / République',              flux:'OMR',                   etat:'EMPLACEMENTS VALIDÉS', projet:'A CRÉER', type:'ENTERRÉE' },
  { id:'e02', lat:49.29048328, lng:-0.11545114, adresse:'Avenue de Bavent / République',              flux:'OMR',                   etat:'EMPLACEMENTS VALIDÉS', projet:'A CRÉER', type:'ENTERRÉE' },
  { id:'e03', lat:49.29049195, lng:-0.11539794, adresse:'Avenue de Bavent / République',              flux:'EMBALLAGES ET PAPIERS', etat:'EMPLACEMENTS VALIDÉS', projet:'A CRÉER', type:'ENTERRÉE' },
  { id:'e04', lat:49.29048763, lng:-0.11539347, adresse:'Avenue de Bavent / République',              flux:'EMBALLAGES ET PAPIERS', etat:'EMPLACEMENTS VALIDÉS', projet:'A CRÉER', type:'ENTERRÉE' },
  { id:'e05', lat:49.29049479, lng:-0.11533817, adresse:'Avenue de Bavent / République',              flux:'VERRE',                 etat:'EMPLACEMENTS VALIDÉS', projet:'A CRÉER', type:'ENTERRÉE' },
  { id:'e06', lat:49.29067938, lng:-0.10952363, adresse:'Avenue de la Libération (place de parking)', flux:'OMR',                   etat:'EMPLACEMENTS VALIDÉS', projet:'A CRÉER', type:'ENTERRÉE' },
  { id:'e07', lat:49.29067430, lng:-0.10950625, adresse:'Avenue de la Libération (place de parking)', flux:'EMBALLAGES ET PAPIERS', etat:'EMPLACEMENTS VALIDÉS', projet:'A CRÉER', type:'ENTERRÉE' },
  { id:'e08', lat:49.29065801, lng:-0.10946188, adresse:'Avenue de la Libération (place de parking)', flux:'VERRE',                 etat:'EMPLACEMENTS VALIDÉS', projet:'A CRÉER', type:'ENTERRÉE' },
  { id:'e09', lat:49.28258109, lng:-0.11974009, adresse:'24 rue du Pont de pierre',                   flux:'OMR',                   etat:'EMPLACEMENTS VALIDÉS', projet:'A CRÉER', type:'ENTERRÉE' },
  { id:'e10', lat:49.29057998, lng:-0.11704714, adresse:'Avenue de Varaville',                        flux:'OMR',                   etat:'EMPLACEMENTS VALIDÉS', projet:'A CRÉER', type:'ENTERRÉE' },
  { id:'e11', lat:49.29057095, lng:-0.11704715, adresse:'Avenue de Varaville',                        flux:'OMR',                   etat:'EMPLACEMENTS VALIDÉS', projet:'A CRÉER', type:'ENTERRÉE' },
  { id:'e12', lat:49.29055290, lng:-0.11707482, adresse:'Avenue de Varaville',                        flux:'EMBALLAGES ET PAPIERS', etat:'EMPLACEMENTS VALIDÉS', projet:'A CRÉER', type:'ENTERRÉE' },
  { id:'e13', lat:49.29054034, lng:-0.11709426, adresse:'Avenue de Varaville',                        flux:'VERRE',                 etat:'EMPLACEMENTS VALIDÉS', projet:'A CRÉER', type:'ENTERRÉE' },
];

// ═══════════════════════════════════════════════════════════
// 2. STATE & LOCALSTORAGE
// ═══════════════════════════════════════════════════════════
let customs   = JSON.parse(localStorage.getItem('ncpa_customs')  || '[]');
let notes     = JSON.parse(localStorage.getItem('ncpa_notes')    || '{}');
// notes[id] = { comment: '...', photo: 'base64...' }

let allEq        = [...INITIAL, ...customs];
let markers      = {};   // id → L.Marker
let addingMode   = false;
let pendingCoords = null;
let pendingMarker = null;
let activeId     = null;

function persist() {
  localStorage.setItem('ncpa_customs', JSON.stringify(customs));
  localStorage.setItem('ncpa_notes',   JSON.stringify(notes));
}

// ═══════════════════════════════════════════════════════════
// 3. CARTE
// ═══════════════════════════════════════════════════════════
const map = L.map('map', { zoomControl: true }).setView([49.2895, -0.1145], 14);

const CARTO = L.tileLayer(
  'https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png',
  { attribution:'&copy; OpenStreetMap &copy; CARTO', subdomains:'abcd', maxZoom:22 }
).addTo(map);

const ESRI = L.tileLayer(
  'https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}',
  {
    attribution:'Tiles &copy; Esri', maxZoom:22,
    errorTileUrl:'data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAAAEAAAABCAYAAAAfFcSJAAAADUlEQVR42mNkYPhfDwAChwGA60e6kgAAAABJRU5ErkJggg=='
  }
);

L.control.layers({ 'Plan (CartoDB)': CARTO, 'Satellite (Esri)': ESRI }, {}, { position:'topright' }).addTo(map);

// ═══════════════════════════════════════════════════════════
// 4. MARQUEURS
// ═══════════════════════════════════════════════════════════
const FLUX_CFG = {
  'OMR':                   { color:'#374151', abbr:'R' },
  'EMBALLAGES ET PAPIERS': { color:'#B45309', abbr:'E' },
  'VERRE':                 { color:'#166534', abbr:'V' },
  'TEXTILE':               { color:'#6D28D9', abbr:'T' },
  'CARTON':                { color:'#7C2D12', abbr:'C' },
  'AUTRE':                 { color:'#475569', abbr:'?' },
};

function getFlux(flux) {
  return FLUX_CFG[flux] || FLUX_CFG['AUTRE'];
}

function makeIcon(flux, custom=false, selected=false) {
  const { color, abbr } = getFlux(flux);
  const border = selected ? '#facc15' : (custom ? '#f59e0b' : '#fff');
  const size   = selected ? 34 : 28;
  const bw     = selected ? 4  : 3;
  return L.divIcon({
    html: `<div style="
      width:${size}px; height:${size}px; border-radius:50%;
      background:${color}; border:${bw}px solid ${border};
      box-shadow:0 2px 6px rgba(0,0,0,${selected?'.55':'.35'});
      display:flex; align-items:center; justify-content:center;
      color:#fff; font-size:${selected?13:11}px; font-weight:800;
      transition:all .15s;
    ">${abbr}</div>`,
    iconSize: [size, size],
    iconAnchor: [size/2, size/2],
    className: ''
  });
}

function addMarker(eq) {
  const m = L.marker([eq.lat, eq.lng], {
    icon: makeIcon(eq.flux, eq.custom),
    draggable: !!eq.custom
  });
  m.on('click', () => openEquipment(eq.id));
  if (eq.custom) {
    m.on('dragend', e => {
      const p = e.target.getLatLng();
      const c = customs.find(x => x.id === eq.id);
      const a = allEq.find(x => x.id === eq.id);
      if (c) { c.lat = p.lat; c.lng = p.lng; }
      if (a) { a.lat = p.lat; a.lng = p.lng; }
      persist();
      if (activeId === eq.id) {
        document.getElementById('sb-sub').textContent =
          `Positionnable · ${p.lat.toFixed(5)}, ${p.lng.toFixed(5)}`;
      }
    });
  }
  m.addTo(map);
  markers[eq.id] = m;
}

function loadAll() {
  allEq.forEach(eq => addMarker(eq));
  updateKPI();
}

// ═══════════════════════════════════════════════════════════
// 5. KPI
// ═══════════════════════════════════════════════════════════
function updateKPI() {
  document.getElementById('kpi-total').textContent = allEq.length;
  document.getElementById('kpi-sites').textContent = new Set(allEq.map(e=>e.adresse)).size;
  document.getElementById('kpi-notes').textContent =
    Object.values(notes).filter(n => n.comment && n.comment.trim()).length;
}

// ═══════════════════════════════════════════════════════════
// 6. SIDEBAR — AFFICHAGE ÉQUIPEMENT
// ═══════════════════════════════════════════════════════════
function openEquipment(id) {
  // Reset previous selection
  if (activeId && markers[activeId]) {
    const old = allEq.find(e => e.id === activeId);
    if (old) markers[activeId].setIcon(makeIcon(old.flux, old.custom, false));
  }
  activeId = id;
  const eq = allEq.find(e => e.id === id);
  if (!eq) return;

  // Highlight marker
  markers[id]?.setIcon(makeIcon(eq.flux, eq.custom, true));

  const { color } = getFlux(eq.flux);
  const note = notes[id] || {};
  const statusColor = eq.etat === 'EMPLACEMENTS VALIDÉS' ? '#16a34a' : '#d97706';

  document.getElementById('sb-title').textContent = eq.adresse;
  document.getElementById('sb-sub').textContent   =
    eq.custom ? `Ajouté manuellement · déplaçable` : `Équipement ${id} · initial`;

  document.getElementById('sb-body').innerHTML = `
    <div>
      <div class="section-title">Informations</div>
      <div class="info-card">
        <div class="info-row">
          <span class="info-key">Flux</span>
          <span class="info-val">
            <span class="flux-pill" style="background:${color}">${eq.flux}</span>
          </span>
        </div>
        <div class="info-row">
          <span class="info-key">Type colonne</span>
          <span class="info-val">${eq.type || '—'}</span>
        </div>
        <div class="info-row">
          <span class="info-key">État</span>
          <span class="info-val">
            <span class="status-dot" style="background:${statusColor}"></span>${eq.etat || '—'}
          </span>
        </div>
        <div class="info-row">
          <span class="info-key">Projet</span>
          <span class="info-val">${eq.projet || '—'}</span>
        </div>
        <div class="info-row">
          <span class="info-key">Coordonnées</span>
          <span class="info-val" style="font-family:monospace; font-size:11px">${eq.lat.toFixed(5)}, ${eq.lng.toFixed(5)}</span>
        </div>
      </div>
    </div>

    <div>
      <div class="comment-block">
        <div class="comment-top">
          <div class="section-title" style="margin:0">Commentaire</div>
          <span id="save-badge">✓ Enregistré</span>
        </div>
        <textarea id="comment-ta"
          placeholder="Contraintes ABF, accessibilité, remarques terrain…">${note.comment || ''}</textarea>
      </div>
    </div>

    <div>
      <div class="section-title">Photo terrain</div>
      <div class="photo-block">
        ${note.photo
          ? `<div class="photo-wrap">
               <img src="${note.photo}" alt="photo terrain">
               <button class="photo-del" onclick="deletePhoto('${id}')">✕</button>
             </div>`
          : `<label class="photo-upload-lbl">
               <input type="file" accept="image/*" style="display:none" onchange="uploadPhoto(event,'${id}')">
               📷 Ajouter une photo
             </label>`
        }
      </div>
    </div>

    ${eq.custom ? `<button class="btn-del" onclick="deleteEquipment('${id}')">🗑 Supprimer cet équipement</button>` : ''}
  `;

  document.getElementById('comment-ta').addEventListener('input', () => saveComment(id));

  document.getElementById('sidebar').classList.add('open');
  document.getElementById('map').classList.add('sidebar-open');

  // Zoom
  map.setView([eq.lat, eq.lng], Math.max(map.getZoom(), 18));
}

// ═══════════════════════════════════════════════════════════
// 7. FERMETURE SIDEBAR
// ═══════════════════════════════════════════════════════════
function closeSidebar() {
  if (activeId && markers[activeId]) {
    const old = allEq.find(e => e.id === activeId);
    if (old) markers[activeId].setIcon(makeIcon(old.flux, old.custom, false));
  }
  activeId = null;
  document.getElementById('sidebar').classList.remove('open');
  document.getElementById('map').classList.remove('sidebar-open');
}

// ═══════════════════════════════════════════════════════════
// 8. COMMENTAIRES & PHOTOS
// ═══════════════════════════════════════════════════════════
let saveTimer;
function saveComment(id) {
  const val = document.getElementById('comment-ta')?.value || '';
  if (!notes[id]) notes[id] = {};
  notes[id].comment = val;
  try { persist(); } catch(e) { console.warn('localStorage plein', e); }
  clearTimeout(saveTimer);
  const badge = document.getElementById('save-badge');
  if (badge) {
    badge.classList.add('show');
    saveTimer = setTimeout(() => badge.classList.remove('show'), 2200);
  }
  updateKPI();
}

function uploadPhoto(event, id) {
  const file = event.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = e => {
    const img = new Image();
    img.onload = () => {
      const canvas = document.createElement('canvas');
      const MAX = 900;
      const scale = Math.min(1, MAX / Math.max(img.width, img.height));
      canvas.width  = Math.round(img.width  * scale);
      canvas.height = Math.round(img.height * scale);
      canvas.getContext('2d').drawImage(img, 0, 0, canvas.width, canvas.height);
      const b64 = canvas.toDataURL('image/jpeg', 0.72);
      if (!notes[id]) notes[id] = {};
      notes[id].photo = b64;
      try { persist(); } catch(err) {
        alert('Stockage insuffisant — photo non sauvegardée. Essayez avec une image moins lourde.');
        delete notes[id].photo; return;
      }
      openEquipment(id);
    };
    img.src = e.target.result;
  };
  reader.readAsDataURL(file);
}

function deletePhoto(id) {
  if (!notes[id]) return;
  delete notes[id].photo;
  persist();
  openEquipment(id);
}

// ═══════════════════════════════════════════════════════════
// 9. MODE AJOUT
// ═══════════════════════════════════════════════════════════
function toggleAddMode() {
  addingMode = !addingMode;
  const btn    = document.getElementById('add-btn');
  const banner = document.getElementById('add-banner');
  const mapEl  = document.getElementById('map');

  if (addingMode) {
    btn.classList.add('active');
    btn.textContent = '✕ Annuler';
    banner.style.display = 'block';
    mapEl.classList.add('adding-cursor');
    // Ouvrir le formulaire immédiatement (sans coords)
    openAddForm(null, null);
  } else {
    btn.classList.remove('active');
    btn.textContent = '＋ Ajouter';
    banner.style.display = 'none';
    mapEl.classList.remove('adding-cursor');
    if (pendingMarker) { map.removeLayer(pendingMarker); pendingMarker = null; }
    pendingCoords = null;
    closeSidebar();
  }
}

map.on('click', e => {
  if (!addingMode) return;
  const { lat, lng } = e.latlng;
  pendingCoords = { lat, lng };

  // Déplacer/créer le marqueur temporaire
  if (pendingMarker) map.removeLayer(pendingMarker);
  pendingMarker = L.marker([lat, lng], {
    icon: L.divIcon({
      html: `<div style="
        width:32px; height:32px; border-radius:50%;
        background:#9ca3af; border:3px solid #f59e0b;
        box-shadow:0 2px 8px rgba(0,0,0,.4);
        display:flex; align-items:center; justify-content:center;
        color:#fff; font-size:15px; font-weight:800;">+</div>`,
      iconSize:[32,32], iconAnchor:[16,16], className:''
    })
  }).addTo(map);

  // Mettre à jour coords dans le formulaire si déjà ouvert
  const coordsEl = document.getElementById('coords-display');
  const subEl    = document.getElementById('sb-sub');
  if (coordsEl) coordsEl.textContent = `${lat.toFixed(6)}, ${lng.toFixed(6)}`;
  if (subEl)    subEl.textContent    = `Position : ${lat.toFixed(5)}, ${lng.toFixed(5)}`;
});

function openAddForm(lat, lng) {
  document.getElementById('sb-title').textContent = 'Nouvel équipement';
  document.getElementById('sb-sub').textContent   =
    lat ? `Position : ${lat.toFixed(5)}, ${lng.toFixed(5)}` : 'Cliquez sur la carte pour placer';

  document.getElementById('sb-body').innerHTML = `
    <div class="form-block">
      <div class="fg">
        <label>Adresse / Localisation *</label>
        <input id="new-adresse" type="text" placeholder="ex: Avenue de la Mer">
      </div>
      <div class="fg">
        <label>Flux *</label>
        <select id="new-flux">
          <option value="OMR">OMR</option>
          <option value="EMBALLAGES ET PAPIERS">Emballages & Papiers</option>
          <option value="VERRE">Verre</option>
          <option value="TEXTILE">Textile</option>
          <option value="CARTON">Carton</option>
          <option value="AUTRE">Autre</option>
        </select>
      </div>
      <div class="fg">
        <label>Type de colonne</label>
        <select id="new-type">
          <option value="ENTERRÉE">Enterrée</option>
          <option value="AÉRIENNE">Aérienne</option>
          <option value="SEMI-ENTERRÉE">Semi-enterrée</option>
          <option value="AUTRE">Autre</option>
        </select>
      </div>
      <div class="fg">
        <label>État</label>
        <select id="new-etat">
          <option value="EMPLACEMENTS VALIDÉS">Emplacements validés</option>
          <option value="EN COURS D'ÉTUDE">En cours d'étude</option>
          <option value="À ÉTUDIER">À étudier</option>
          <option value="PROBLÈME IDENTIFIÉ">Problème identifié</option>
          <option value="REFUS COMMUNE">Refus commune</option>
        </select>
      </div>
      <div class="fg">
        <label>Commentaire initial</label>
        <textarea id="new-comment" rows="3" placeholder="Observations, contraintes…" style="padding:7px 9px; border:1px solid #d1d5db; border-radius:5px; font-family:inherit; font-size:13px; resize:vertical;"></textarea>
      </div>
      <div class="fg">
        <label>Position sur la carte</label>
        <div class="coords-box" id="coords-display">${lat ? `${lat.toFixed(6)}, ${lng.toFixed(6)}` : '— cliquez sur la carte —'}</div>
        <div class="hint">Le marqueur + (jaune) indique la position. Recliquez pour déplacer.</div>
      </div>
    </div>
    <button class="btn-save" onclick="saveNewEquipment()">✓ Enregistrer l'équipement</button>
  `;

  document.getElementById('sidebar').classList.add('open');
  document.getElementById('map').classList.add('sidebar-open');
}

function saveNewEquipment() {
  if (!pendingCoords) { alert('Cliquez d\'abord sur la carte pour placer l\'équipement.'); return; }

  const adresse = document.getElementById('new-adresse')?.value?.trim();
  if (!adresse) { alert('Veuillez saisir une adresse / localisation.'); return; }

  const flux    = document.getElementById('new-flux')?.value;
  const type    = document.getElementById('new-type')?.value;
  const etat    = document.getElementById('new-etat')?.value;
  const comment = document.getElementById('new-comment')?.value?.trim();

  const id = 'c' + Date.now();
  const eq = { id, lat: pendingCoords.lat, lng: pendingCoords.lng,
    adresse, flux, type, etat, projet: 'A CRÉER', custom: true };

  customs.push(eq);
  allEq.push(eq);
  if (comment) notes[id] = { comment };
  try { persist(); } catch(e) { alert('Erreur de sauvegarde.'); return; }

  // Retirer le marqueur temporaire, créer le vrai
  if (pendingMarker) { map.removeLayer(pendingMarker); pendingMarker = null; }
  addMarker(eq);

  // Quitter le mode ajout
  addingMode = false;
  pendingCoords = null;
  document.getElementById('add-btn').classList.remove('active');
  document.getElementById('add-btn').textContent = '＋ Ajouter';
  document.getElementById('add-banner').style.display = 'none';
  document.getElementById('map').classList.remove('adding-cursor');

  updateKPI();
  openEquipment(id);
}

function deleteEquipment(id) {
  if (!confirm('Supprimer définitivement cet équipement ?')) return;
  customs = customs.filter(e => e.id !== id);
  allEq   = allEq.filter(e => e.id !== id);
  delete notes[id];
  persist();
  if (markers[id]) { map.removeLayer(markers[id]); delete markers[id]; }
  closeSidebar();
  updateKPI();
}

// ═══════════════════════════════════════════════════════════
// 10. EXPORT JSON
// ═══════════════════════════════════════════════════════════
function exportData() {
  const data = allEq.map(eq => ({
    ...eq,
    commentaire: notes[eq.id]?.comment || '',
    photo: notes[eq.id]?.photo ? '(image incluse)' : ''
  }));
  const blob = new Blob([JSON.stringify({ export_date: new Date().toISOString(), equipements: data }, null, 2)],
    { type: 'application/json' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = `PAV_Cabourg_${new Date().toISOString().slice(0,10)}.json`;
  a.click();
}
